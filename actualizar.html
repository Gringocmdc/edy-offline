<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#102a21">
<title>Actualizar EDY</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08140f;color:#edf5ef;font-family:system-ui,-apple-system,sans-serif;padding:24px}.box{width:min(620px,100%);background:#10231a;border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:24px}.spin{font-size:48px;display:block;margin-bottom:12px}h1{margin:0 0 8px}p{color:#a9b8af;line-height:1.5}.bar{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:18px}.bar span{display:block;height:100%;width:15%;background:#2f9a62;border-radius:999px;animation:move 1.2s infinite alternate}@keyframes move{to{width:100%}}button{width:100%;border:0;border-radius:13px;padding:13px;font-weight:800;background:#2f9a62;color:white;margin-top:15px}
</style>
</head>
<body>
<div class="box">
  <span class="spin">🔄</span>
  <h1>Actualizando EDY</h1>
  <p id="status">Limpiando solamente los archivos temporales. El inventario, el perfil familiar y los documentos privados no se borran.</p>
  <div class="bar"><span></span></div>
  <button id="retry" hidden onclick="run()">Reintentar</button>
</div>
<script>
async function run(){
 const status=document.getElementById('status'),retry=document.getElementById('retry');retry.hidden=true;
 try{
  if('serviceWorker' in navigator){
   const regs=await navigator.serviceWorker.getRegistrations();
   await Promise.all(regs.map(r=>r.unregister()));
  }
  if('caches' in window){
   const keys=await caches.keys();
   await Promise.all(keys.filter(k=>k.startsWith('edy-offline-v')).map(k=>caches.delete(k)));
  }
  status.textContent='Archivos temporales actualizados. Abriendo EDY…';
  setTimeout(()=>location.replace(`./?updated=${Date.now()}`),600);
 }catch(e){
  status.textContent='No se pudo completar automáticamente. Revisá la conexión y tocá Reintentar.';
  retry.hidden=false;
 }
}
run();
</script>
</body>
</html>
